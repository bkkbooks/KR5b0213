body:
  text: 黃籙十念儀黃籙五老悼亡儀黄籙十念儀法事如式伏以天覆地載宻運生化之樞機日往月來盡屬虧盈之光景惟是春榮秋落陽息隂消難逃遷謝之期孰免輪廻之數況乎人生三界性禀五常如石火之耀明似電光之倐忽倘非得道曷守眞常今者亡過性禀沖和心懷上善妄想椿松等壽金石齊年柰何三彭二竪以相催四大百骸而莫駐繇是相離慘切眷戀悲傷慨殁後之情深痛生前之義重是用嚴精法㑹䖍備珍羞啓三境之髙眞揚十華之寳號伏願神魂不昧儼若生存頓釋塵縁恭聽法語按人各恭敬宣吿亡靈第一歸依無上道寳十方大聖太上三尊億劫度人先天立教慈悲廣濟溥及羣生玉相金容分形變化影隨響答善應無方此世他生常當信禮宣吿亡靈第二歸依無上經寳十方上聖寳藏靈文五字金書龍章鳯篆三十六部萬八千篇指引沉迷超昇道岸行行滅罪句句消愆此世他生常當信禮宣吿亡靈第三歸依無上師寳玄中大聖上古三師正一眞人三天教主十方世界得道神仙傳法授經開悟羣品是眞父母是大醫王此世他生常當信禮伏以道引登眞之路經傳化善之階祕典琅函仗簮裳而讃詠靈音妙範引魂魄以超昇人閒之光景難留何煩顧戀仙界之雲軿自在任意躋攀巳聞三寳之名再舉十華之號道塲衆等十念如法志心信禮東方九炁天君神仙諸靈官稽首東方主玉寳皇上尊願垂大慈力超度此亡靈和往生神仙界志心信禮南方三炁天君神仙諸靈官稽首南方主玄眞萬福尊願垂大慈力超度此亡靈和往生神仙界志心信禮西方九炁天君神仙諸靈官稽首西方主太妙至極尊願垂大慈力超度此亡靈和往生神仙界志心信禮北方五炁天君神仙諸靈官稽首北方主玄上玉晨尊願垂大慈力超度此亡靈和往生神仙界志心信禮東北方梵炁天君神仙諸靈官稽首東北主度仙上聖尊願垂大慈力超度此亡靈和往生神仙界志心信禮東南方梵炁天君神仙諸靈官稽首東南主好生度命尊願垂大慈力超度此亡靈和徃生神仙界志心信禮西南方梵炁天君神仙諸靈官稽首西南主太靈虚皇尊願垂大慈力超度此亡靈和往生神仙界志心信禮西北方梵炁天君神仙諸靈官稽首西北主無量太華尊願垂大慈力超度此亡靈和往生神仙界志心信禮上方一炁天君神仙諸靈官稽首上方主玉虚明皇尊願垂大慈力超度此亡靈和往生神仙界志心信禮下方九壘土皇君神仙諸靈官稽首下方主眞皇洞神尊願垂大慈力超度此亡靈和徃生神仙界禮念十方空界一切天君奉爲亡靈䖍誠懴悔次懴悔志心懴悔奉爲亡靈懴悔亡過身業罪身業無邊罪種種亦難量舉止去來間滯染諸塵垢華飾貪逸樂傲誕世間人今對大慈尊一心陳懴悔願此亡靈身業罪消除永不生清淨契神仙永離三途苦衆和志心稽首禮謝無上正眞三寳志心懴悔奉爲亡靈懴悔亡過口業罪口業無邊罪種種亦難量兩舌及浮言毀謗眞經教啗食有情物窘辱世間人今對大慈尊一心陳懴悔願此亡靈口業罪銷除永不生絶彼是非言常演眞經教衆和志心稽首禮謝無上正眞三寳志心懴悔奉爲亡靈懴悔亡過心業罪心業無邊罪種種亦難量嗔喜及愛憎一切從心起嗜慾兼虚妄嫉妬世間人今對大慈尊一心陳懴悔願此亡靈心業罪消除永不生智識逈開明洞逹希夷旨衆和志心稽首禮謝無上正眞三寳志心懴悔奉爲亡靈懴悔亡過慳貪嗔怒愚癡罪邪淫偷盗殺生愆謗經毀教不歸依怨道咎師違盟誓身心妄想無休息耳眼生貪不住時過去未來及今生三世罪根難可測此日發心陳懴悔從前障惱願消除言詞旣向道前陳衆聖定應空裏鑒衆和志心稽首禮謝無上正眞三寳志心懴悔奉爲亡過懴悔亡靈耳眼鼻舌身心罪六情六欲六根愆管絃嘹喨少眞音紫緑繁華非正色蘭麝競裝馨香處車馬崢嶸馳騁時甘辛百節恣傷神喜怒無常唯奪壽六情每引沉淪路三寳常開拯拔門從今發露首前愆總願罪根悉消滅衆和志心稽首禮謝無上正眞三寳向來稱揚十念功德無限良因用薦亡魂超昇仙界唯願雲車鶴駕從空裏以來臨寳節瑶幢自丹霄而接引騫林𣗳下常聽眞經寳月池邊時聞雅範生前萬罪隨懴念以消除殁後千愆仗今辰而解釋一禮一懴句句消愆功德巍巍除殃滅罪刀山成寳座劒樹化騫林獄卒竟修仙牛頭成上道鑊湯消業火泉曲罷寒氷五道與三途火車皆消散生前諸罪咎釁結在鄷都六情多恣縱萬惡逐緑生心口意三業耳眼鼻舌身更願神超碧落飛歩黄庭謁玉帝於天宫㑹列仙於雲路躋攀瓊樹嬉戲瑶池閑登劫仞之臺道契無爲之侣飛昇遂性動植昭甦一切有情同登道岸黃籙十念儀
